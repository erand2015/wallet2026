name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS (verbose)
        run: flutter build ios --release --no-codesign -v
      
      - name: List build output
        run: |
          echo "Contents of build/ios/iphoneos:"
          ls -la build/ios/iphoneos/ || echo "Directory not found"
          echo "Contents of build/ios:"
          ls -la build/ios/ || echo "Directory not found"
      
      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/WarthogWallet.ipa Payload
          cd ../..
          ls -la build/ios/ipa/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: build/ios/ipa/*.ipa