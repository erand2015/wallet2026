workflows:
  ios-build:
    name: iOS Build
    environment:
      groups:
        - App Store Connect
      vars:
        BUNDLE_ID: "com.erand2015.warthogwallet"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
      
      - name: Create IPA
        script: |
          echo "🔍 Creating IPA..."
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r WarthogWallet.ipa Payload
          ls -la WarthogWallet.ipa
      
    artifacts:
      - WarthogWallet.ipa
    
    publishing:
      email:
        recipients:
          - erand2015@hotmail.com
