name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Verify Flutter setup
        run: |
          flutter doctor -v
          flutter devices
      
      - name: Build iOS (alternative method)
        run: |
          flutter build ios --release --no-codesign 2>&1 | tee build_log.txt
          cat build_log.txt
        continue-on-error: true
      
      - name: Check if build succeeded
        id: check_build
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "Build failed - Runner.app not found"
            exit 1
          fi
      
      - name: Create IPA
        if: steps.check_build.outputs.success == 'true'
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/WarthogWallet.ipa Payload
          cd ../..
          ls -la ipa/
      
      - name: Upload IPA
        if: steps.check_build.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: build/ios/ipa/*.ipa