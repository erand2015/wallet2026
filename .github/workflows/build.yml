name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Find and upload IPA
        run: |
          echo "🔍 Searching for .ipa file..."
          
          # Gjej çdo skedar .ipa
          IPA_FILE=$(find . -name "*.ipa" -type f | head -1)
          
          if [ -z "$IPA_FILE" ]; then
            echo "❌ No .ipa file found!"
            echo "Searching for Runner.app instead..."
            find . -name "Runner.app" -type d
            exit 1
          fi
          
          echo "✅ Found IPA at: $IPA_FILE"
          
          # Kopjo IPA në vendin e pritur nga upload
          mkdir -p ipa_output
          cp "$IPA_FILE" ipa_output/
          ls -la ipa_output/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: ipa_output/*.ipa