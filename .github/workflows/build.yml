name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA from Runner.app
        run: |
          echo "🔍 Creating IPA from Runner.app..."
          
          # Kontrollo nëse Runner.app ekziston
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/Release-iphoneos/Runner.app"
          else
            echo "❌ Runner.app not found!"
            find . -name "Runner.app" -type d
            exit 1
          fi
          
          echo "✅ Found Runner.app at: $APP_PATH"
          
          # Krijo dosjen Payload dhe ZIP
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WarthogWallet.ipa Payload
          
          echo "✅ IPA created: $(pwd)/WarthogWallet.ipa"
          ls -la WarthogWallet.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: WarthogWallet.ipa