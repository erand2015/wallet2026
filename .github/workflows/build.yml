name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS (ignore signing errors)
        run: |
          flutter build ios --release --no-codesign 2>&1 | tee build_log.txt
          # Kontrollo nëse Runner.app u krijua pavarësisht gabimeve
          if [ -d "build/ios/iphoneos/Runner.app" ] || [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            echo "✅ Build succeeded - Runner.app found"
          else
            echo "❌ Build failed - Runner.app not found"
            exit 1
          fi
      
      - name: Find and create IPA
        run: |
          echo "🔍 Finding Runner.app..."
          
          # Gjej Runner.app
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cp -r build/ios/iphoneos/Runner.app .
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            cp -r build/ios/Release-iphoneos/Runner.app .
          else
            echo "❌ Runner.app not found!"
            find . -name "Runner.app" -type d
            exit 1
          fi
          
          echo "✅ Runner.app found"
          
          # Krijo IPA
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r WarthogWallet.ipa Payload
          
          echo "✅ IPA created"
          ls -la WarthogWallet.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: WarthogWallet.ipa