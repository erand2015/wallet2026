name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      
      - name: Find Runner.app and create IPA
        run: |
          echo "🔍 Searching for Runner.app..."
          
          # Gjej Runner.app kudo
          RUNNER_PATH=$(find . -name "Runner.app" -type d | head -1)
          
          if [ -z "$RUNNER_PATH" ]; then
            echo "❌ Runner.app not found!"
            echo "Contents of build/ios:"
            ls -la build/ios/ || echo "build/ios not found"
            echo "Contents of build:"
            ls -la build/ || echo "build not found"
            exit 1
          fi
          
          echo "✅ Found Runner.app at: $RUNNER_PATH"
          
          # Krijo IPA
          mkdir -p Payload
          cp -r "$RUNNER_PATH" Payload/
          zip -r WarthogWallet.ipa Payload
          
          echo "✅ IPA created: $(pwd)/WarthogWallet.ipa"
          ls -la WarthogWallet.ipa
          file WarthogWallet.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: WarthogWallet.ipa