name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Create .ipa without signing (for Sideloadly)
        run: |
          echo "🔍 Building iOS app..."
          flutter build ios --release --no-codesign 2>&1 | tee build_log.txt || true
          
          echo "🔍 Searching for Runner.app..."
          RUNNER_PATH=$(find . -name "Runner.app" -type d | head -1)
          
          if [ -z "$RUNNER_PATH" ]; then
            echo "❌ Runner.app not found!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          echo "✅ Found Runner.app at: $RUNNER_PATH"
          
          # Krijo IPA
          mkdir -p Payload
          cp -r "$RUNNER_PATH" Payload/
          zip -r WarthogWallet.ipa Payload
          
          echo "✅ IPA created successfully!"
          ls -la WarthogWallet.ipa
          file WarthogWallet.ipa
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: WarthogWallet.ipa