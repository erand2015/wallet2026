name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          set -e
          echo "Current directory: $(pwd)"
          
          # Kërko Runner.app në vendet e mundshme
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            RUNNER_PATH="build/ios/iphoneos"
          elif [ -d "build/build/ios/iphoneos/Runner.app" ]; then
            RUNNER_PATH="build/build/ios/iphoneos"
          else
            echo "❌ Runner.app not found!"
            find . -name "Runner.app" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi
          
          echo "✅ Runner.app found at $RUNNER_PATH"
          
          # Krijo IPA në vendin e duhur
          mkdir -p build/ios/ipa
          cd $RUNNER_PATH
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../ios/ipa/WarthogWallet.ipa Payload
          cd ../../..
          
          echo "✅ IPA created at $(pwd)/build/ios/ipa/WarthogWallet.ipa"
          ls -la build/ios/ipa/
      
      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarthogWallet
          path: build/ios/ipa/*.ipa